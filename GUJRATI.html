        .box1::before{
            content: '';
            position:absolute;
            background-color:rgba(0, 0, 0, 0.54);
             width: 400px;
            height: 200px;
            transition: 2s;
        }
        .box1::after{
            content: '';
            position:absolute;
            background-color: rgba(0, 0, 0, 0.54);
             width: 400px;
            height: 200px;
            bottom: 0;
             transition: 2s;
        }
        .box1:hover::before{
            height: 0;
        }
        .box1:hover::after{
            height: 0;
        }
